<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creo — Chess</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 32px;
        background: #1a1a2e;
        color: #eee;
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }

      .chess-app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        user-select: none;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 512px;
      }

      .title {
        font-size: 22px;
        font-weight: 700;
        flex: 1;
      }

      .reset-btn {
        padding: 6px 14px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #2a2a4a;
        color: #ccc;
        cursor: pointer;
        font-size: 13px;
      }
      .reset-btn:hover {
        background: #3a3a5a;
      }

      /* ---- Status bar ---- */

      .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 512px;
        padding: 8px 12px;
        background: #2a2a4a;
        border-radius: 6px;
        font-size: 14px;
      }

      .turn-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid #666;
      }
      .turn-dot.white {
        background: #fff;
        border-color: #999;
      }
      .turn-dot.black {
        background: #222;
        border-color: #666;
      }

      .status-text {
        flex: 1;
      }

      /* ---- Board ---- */

      .board {
        display: grid;
        grid-template-columns: repeat(8, 64px);
        grid-template-rows: repeat(8, 64px);
        border: 3px solid #444;
        border-radius: 4px;
        overflow: hidden;
      }

      .square {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: pointer;
      }

      .square.light {
        background: #f0d9b5;
      }
      .square.dark {
        background: #b58863;
      }

      .square.selected.light {
        background: #f7ec5a;
      }
      .square.selected.dark {
        background: #dbc34a;
      }

      .square.last-move.light {
        background: #e8d44d88;
      }
      .square.last-move.dark {
        background: #c8a43088;
      }

      .square.in-check.light,
      .square.in-check.dark {
        background: radial-gradient(
          ellipse at center,
          #ff4444 0%,
          #cc000088 60%,
          transparent 80%
        );
      }

      .square.valid-target {
        cursor: pointer;
      }

      .move-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.2);
      }

      .square.capture-target::after {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 50%;
        border: 3px solid rgba(0, 0, 0, 0.25);
      }

      .piece {
        font-size: 46px;
        line-height: 1;
        pointer-events: none;
        text-shadow: 3px 4px 0px rgba(0, 0, 0, 0.2);
      }

      .black-piece {
        color: #222;
      }

      .white-piece {
        color: #eee;
      }

      /* ---- File labels ---- */

      .file-labels {
        display: grid;
        grid-template-columns: repeat(8, 64px);
        width: 512px;
      }
      .file-label {
        text-align: center;
        font-size: 12px;
        color: #888;
      }

      /* ---- Drag ghost ---- */

      .drag-ghost {
        position: fixed;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 1000;
        font-size: 54px;
        line-height: 1;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
        opacity: 0.9;
      }

      .dragging-active {
        cursor: grabbing;
      }
      .dragging-active * {
        cursor: grabbing !important;
      }

      /* ---- Promotion dialog ---- */

      .promo-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }

      .promo-dialog {
        display: flex;
        gap: 8px;
        padding: 16px;
        background: #2a2a4a;
        border: 2px solid #555;
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .promo-btn {
        width: 72px;
        height: 72px;
        font-size: 48px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #555;
        border-radius: 8px;
        background: #3a3a5a;
        cursor: pointer;
        transition:
          background 0.1s,
          border-color 0.1s;
      }
      .promo-btn:hover {
        background: #4a90d9;
        border-color: #4a90d9;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
