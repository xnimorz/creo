<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creo — Router Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    .shell { max-width: 640px; margin: 0 auto; padding: 32px; }

    /* Navigation */
    .nav {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px;
    }
    .nav a {
      padding: 8px 14px;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.1s;
    }
    .nav a:hover { background: #f0f0f0; }
    .nav a.active { background: #4a90d9; color: #fff; }

    /* Content */
    .content {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 24px;
      min-height: 200px;
    }

    h1 { font-size: 22px; margin-bottom: 12px; }
    h2 { font-size: 18px; margin-bottom: 8px; }
    p { line-height: 1.6; color: #444; margin-bottom: 8px; }

    /* User list */
    .user-list { list-style: none; }
    .user-list li { padding: 10px 0; border-bottom: 1px solid #eee; }
    .user-list li:last-child { border-bottom: none; }
    .user-list a { color: #4a90d9; text-decoration: none; font-weight: 500; }
    .user-list a:hover { text-decoration: underline; }

    /* User profile */
    .profile-card {
      padding: 16px;
      background: #f9f9f9;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .profile-card dt { font-weight: 600; font-size: 13px; color: #666; margin-top: 10px; }
    .profile-card dt:first-child { margin-top: 0; }
    .profile-card dd { font-size: 15px; margin: 2px 0 0; }

    .back-link { display: inline-block; margin-top: 16px; color: #4a90d9; cursor: pointer; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }

    .not-found { text-align: center; padding: 40px 0; color: #999; }
    .not-found h1 { font-size: 48px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
