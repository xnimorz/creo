<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creo — Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 32px;
      background: #f5f5f5;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
    }

    .app { max-width: 480px; width: 100%; }

    h1 { font-size: 24px; margin-bottom: 16px; }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .add-input:focus { outline: 2px solid #4a90d9; outline-offset: -1px; }

    .btn {
      padding: 8px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { background: #eee; }
    .btn-primary { background: #4a90d9; color: #fff; border-color: #4a90d9; }
    .btn-primary:hover { background: #357abd; }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }

    .card-header {
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
      background: #f9f9f9;
      border-bottom: 1px solid #ddd;
    }

    .card-body { padding: 0; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 14px;
      transition: background 0.1s;
      user-select: none;
    }
    .todo-item:not(:last-child) { border-bottom: 1px solid #eee; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #999; }
    .todo-item.dragging { opacity: 0.25; }
    .todo-item.drop-above { box-shadow: inset 0 3px 0 #4a90d9; background: #f0f6ff; }
    .todo-item.drop-below { box-shadow: inset 0 -3px 0 #4a90d9; background: #f0f6ff; }

    .dragging-active { cursor: grabbing; }
    .dragging-active * { cursor: grabbing !important; }

    .drag-ghost {
      position: fixed;
      transform: translate(-16px, -50%);
      pointer-events: none;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 14px;
      background: #fff;
      border: 1px solid #4a90d9;
      border-radius: 6px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      opacity: 0.92;
      white-space: nowrap;
      max-width: 400px;
    }
    .todo-item.editing { padding: 6px 16px; }

    .drag-handle {
      cursor: grab;
      color: #aaa;
      font-size: 16px;
      line-height: 1;
      padding: 2px 0;
    }
    .drag-handle:hover { color: #666; }

    .todo-check {
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }

    .todo-text { flex: 1; cursor: pointer; padding: 2px 0; border-radius: 3px; }
    .todo-text:hover { background: #f0f6ff; }

    .todo-delete {
      color: #c44;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .todo-item:hover .todo-delete { opacity: 1; }
    .todo-delete:hover { color: #a00; }

    .edit-input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #4a90d9;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      width: 100%;
    }

    .filter-bar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .btn-filter { font-size: 12px; padding: 4px 10px; }

    .empty { padding: 24px 16px; text-align: center; color: #999; font-size: 14px; }
    .footer { padding: 10px 16px; font-size: 12px; color: #777; background: #f9f9f9; border-top: 1px solid #ddd; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
